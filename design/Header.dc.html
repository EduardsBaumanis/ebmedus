<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Krona+One&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'PMESAN';src:url('fonts/PMESAN.ttf') format('truetype');font-display:swap}
</style>
</helmet>
<div style="display:flex;align-items:center;justify-content:space-between;padding:18px 44px;background:#faf7ec;border-bottom:1px solid rgba(20,30,50,.10);font-family:'PMESAN',sans-serif;position:sticky;top:0;z-index:50">
  <a href="index.dc.html" style="display:flex;align-items:center"><img src="assets/logo-trans.png" alt="Lielvaicēni" style="height:40px;width:auto"></a>
  <div style="display:flex;align-items:center;gap:26px;font:400 13px/1 'Krona One',sans-serif;letter-spacing:.3px">
    <sc-for list="{{items}}" as="item" hint-placeholder-count="6">
      <sc-if value="{{item.active}}" hint-placeholder-val="{{true}}">
        <a href="{{item.href}}" style="text-decoration:none;color:#e2971b;position:relative;padding-bottom:5px;white-space:nowrap">{{item.label}}<span style="position:absolute;left:0;right:0;bottom:-1px;height:2px;background:#e2971b;border-radius:2px"></span></a>
      </sc-if>
      <sc-if value="{{item.inactive}}" hint-placeholder-val="{{true}}">
        <a href="{{item.href}}" style="text-decoration:none;color:#182234;opacity:.72;position:relative;padding-bottom:5px;white-space:nowrap" style-hover="opacity:1;color:#e2971b">{{item.label}}</a>
      </sc-if>
    </sc-for>
  </div>
  <a href="kontakti.dc.html" style="display:flex;align-items:center;gap:9px;background:#1e2a41;color:#f4efdb;padding:11px 18px;border-radius:40px;font:400 13px/1 'Krona One',sans-serif;text-decoration:none"><span style="width:7px;height:7px;border-radius:50%;background:#f7cf20"></span>+371 29161420</a>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:78},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;sakums&quot;,&quot;par-mums&quot;,&quot;produkti&quot;,&quot;pakalpojumi&quot;,&quot;invertsirups&quot;,&quot;kontakti&quot;],&quot;default&quot;:&quot;sakums&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'sakums';
    const items = [
      { key: 'sakums', label: 'Sākums', href: 'index.dc.html' },
      { key: 'par-mums', label: 'Par mums', href: 'par-mums.dc.html' },
      { key: 'produkti', label: 'Produkti', href: 'produkti.dc.html' },
      { key: 'pakalpojumi', label: 'Pakalpojumi', href: 'pakalpojumi.dc.html' },
      { key: 'invertsirups', label: 'Invertsīrups', href: 'invertsirups.dc.html' },
      { key: 'kontakti', label: 'Kontakti', href: 'kontakti.dc.html' },
    ].map(it => ({ ...it, active: it.key === active, inactive: it.key !== active }));
    return { items };
  }
}
</script>
</body>
</html>
